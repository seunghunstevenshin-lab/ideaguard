<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | IdeaGuard</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" onload="this.rel='stylesheet'"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

  <!-- Icons (index.html과 동일 버전) -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">

  <style>
    /* CSS Variables (Design Tokens) */
    :root {
      --bg-primary: #0a0b0d;
      --mid: #6366f1;
      --mid-dark: #4f46e5;
      --accent: #22d3ee;
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --glow-indigo: 0 0 32px rgba(99,102,241,0.25);
      --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      --font-display: 'Montserrat', sans-serif;
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Glow Effects for Dark Theme */
    body::before {
      content: "";
      position: absolute;
      top: -20%;
      left: 50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34,211,238,0.1) 0%, transparent 70%);
      filter: blur(60px);
      transform: translateX(-50%);
      z-index: -1;
      pointer-events: none;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      margin: 0;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(34,211,238,0.3);
      letter-spacing: -2px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    .error-desc {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.6rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      background: var(--mid);
      color: #fff;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--mid-dark);
      box-shadow: var(--glow-indigo);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <h1 class="error-code">404</h1>
  <div class="error-title">페이지를 찾을 수 없습니다.</div>
  <div class="error-desc">
    요청하신 페이지가 사라졌거나 잘못된 경로입니다.<br>
    The page you are looking for doesn't exist or has been moved.
  </div>
  
  <a href="/" class="btn">
    <i class="fa-solid fa-house"></i> 
    메인으로 돌아가기
  </a>

</body>
</html>
